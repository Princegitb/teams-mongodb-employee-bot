<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Employee Assistant - MongoDB Atlas</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <!-- App Header -->
        <header class="app-header">
            <div class="header-main">
                <h1>MongoDB Middleware Chat Application</h1>
            </div>

        </header>

        <!-- Chat Area -->
        <div class="chat-container">
            <div id="chatHistory" class="chat-history">
                <!-- Welcome Message -->
                <div class="message assistant">
                    <div class="message-bubble">
                        Welcome! I can help you search, filter, and analyze the employee database. Try asking a
                        question below or use one of the quick suggestions!
                    </div>
                </div>
            </div>

            <!-- Quick Suggestion Chips -->
            <div class="suggestions-container">
                <button class="chip" data-query="How many employees are there?">👥 Total Employees</button>
                <button class="chip" data-query="List all employees">📋 List All</button>
                <button class="chip" data-query="Show employees in IT department">💻 IT Department</button>
                <button class="chip" data-query="What is the Average Salary?"> Avg Salary</button>
            </div>

            <!-- Input Form -->
            <form id="chatForm" class="chat-input-area">
                <input type="text" id="userInput" placeholder="Ask about employees (e.g., 'Who is the HR Manager?')...."
                    autocomplete="off" required>
                <button type="submit" id="sendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Send
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
